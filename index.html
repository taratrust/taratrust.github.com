<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Tara Learning App</title>
    <meta name="description" content="Welcome to Tara 567">
    
    <!-- Google Fonts & Font Awesome Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="logo.png" type="image/png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #f0f7ff;
        }

        /* ===== MAIN LANDING PAGE CONTAINER ===== */
        .landing-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: 
                radial-gradient(circle at 10% 10%, rgba(56, 189, 248, 0.25) 0%, transparent 45%),
                radial-gradient(circle at 90% 90%, rgba(37, 99, 235, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(147, 197, 253, 0.25) 0%, transparent 70%),
                linear-gradient(180deg, #ffffff 0%, #f0f7ff 50%, #e0f2fe 100%);
            position: relative;
        }

        /* Decorative background elements */
        .bg-deco-circle {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(56, 189, 248, 0.2);
            pointer-events: none;
        }

        .deco-1 { width: 300px; height: 300px; top: -50px; left: -100px; }
        .deco-2 { width: 400px; height: 400px; bottom: -100px; right: -100px; }

        .landing-content {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        /* ===== LOGO DISPLAY ===== */
        .logo-container {
            width: 100%;
            max-width: 320px;
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            width: 100%;
            border-radius: 20%;
            max-width: 290px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 15px 35px rgba(37, 99, 235, 0.35));
            transition: transform 0.3s ease;
        }

        .logo-container img:hover {
            transform: scale(1.03);
        }

        /* ===== ACTION BUTTONS CONTAINER ===== */
        .actions-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* BUTTON 1: DOWNLOAD APP (ELECTRIC ROYAL BLUE) */
        .btn-download-blue {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            width: 100%;
            padding: 20px 24px;
            border-radius: 24px;
            background: linear-gradient(180deg, #60a5fa 0%, #2563eb 50%, #1d4ed8 100%);
            color: #ffffff;
            font-size: 20px;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.45), inset 0 2px 2px rgba(255, 255, 255, 0.6);
            border: 2.5px solid #ffffff;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-download-blue i {
            font-size: 24px;
            color: #ffffff;
        }

        .btn-download-blue:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 18px 40px rgba(37, 99, 235, 0.65);
        }

        .btn-download-blue:active {
            transform: translateY(1px);
        }

        /* BUTTON 2: WHATSAPP US (EMERALD GREEN) */
        .btn-whatsapp-green {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            width: 100%;
            padding: 20px 24px;
            border-radius: 24px;
            background: linear-gradient(180deg, #4ade80 0%, #22c55e 50%, #16a34a 100%);
            color: #ffffff;
            font-size: 20px;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 12px 30px rgba(34, 197, 94, 0.4), inset 0 2px 2px rgba(255, 255, 255, 0.5);
            border: 2.5px solid #ffffff;
            transition: all 0.3s ease;
        }

        .btn-whatsapp-green i {
            font-size: 28px;
        }

        .btn-whatsapp-green:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 18px 40px rgba(34, 197, 94, 0.55);
        }

        .btn-whatsapp-green:active {
            transform: translateY(1px);
        }

        /* CARD 3: SAFE & SECURE TRUST CARD (BLUE THEME) */
        .trust-card {
            background: #ffffff;
            border: 2px solid #bae6fd;
            border-radius: 24px;
            padding: 16px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.12);
            width: 100%;
            transition: all 0.3s ease;
        }

        .trust-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(37, 99, 235, 0.2);
            border-color: #38bdf8;
        }

        .laurel-leaf {
            color: #38bdf8;
            font-size: 22px;
            opacity: 0.9;
        }

        .trust-center-content {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .shield-badge {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, #38bdf8, #1d4ed8);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
            flex-shrink: 0;
        }

        .trust-text {
            text-align: left;
        }

        .trust-title {
            font-family: 'Outfit', sans-serif;
            font-size: 17px;
            font-weight: 900;
            color: #0f172a;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .trust-subtitle {
            font-size: 11px;
            font-weight: 700;
            color: #2563eb;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* MEDIA QUERIES FOR EXTRA SMALL MOBILE SCREENS */
        @media (max-width: 380px) {
            .landing-wrapper {
                padding: 30px 14px;
            }
            .btn-download-blue, .btn-whatsapp-green {
                font-size: 18px;
                padding: 16px 18px;
            }
            .trust-title {
                font-size: 15px;
            }
            .trust-subtitle {
                font-size: 10px;
            }
            .shield-badge {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- MAIN CLEAN LANDING PAGE -->
    <main class="landing-wrapper">
        <div class="bg-deco-circle deco-1"></div>
        <div class="bg-deco-circle deco-2"></div>

        <div class="landing-content">
            
            <!-- CENTRAL LOGO -->
            <div class="logo-container">
                <img src="logo.png" alt="Tara 567 Logo">
            </div>

            <!-- ACTION BUTTONS & TRUST CARD -->
            <div class="actions-group">
                
                <!-- 1. DOWNLOAD APP BUTTON (ROYAL BLUE) -->
                <a href="Tara567.apk" class="btn-download-blue">
                    <i class="fas fa-download"></i>
                    <span>DOWNLOAD APP</span>
                </a>

                <!-- 2. WHATSAPP US BUTTON (EMERALD GREEN) -->
                <a href="https://wa.me/918905652643?text=Welcome+To+Tara+567" target="_blank" class="btn-whatsapp-green">
                    <i class="fab fa-whatsapp"></i>
                    <span>WHATSAPP US</span>
                </a>

                <!-- 3. SAFE & SECURE CARD (BLUE THEME) -->
                <div class="trust-card">
                    <i class="fas fa-award laurel-leaf"></i>
                    <div class="trust-center-content">
                        <div class="shield-badge">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                        <div class="trust-text">
                            <div class="trust-title">SAFE &amp; SECURE</div>
                            <div class="trust-subtitle">YOUR SAFETY, OUR PRIORITY</div>
                        </div>
                    </div>
                    <i class="fas fa-award laurel-leaf"></i>
                </div>

            </div>

        </div>
    </main>

</body>
</html>
